<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuerdo Especial 💘</title>
<style>
:root { --rosa: #ff4da6; --fondo: #0f0f14; --rojo: #ff0033; }
body {
    margin:0; height:100vh; display:flex; justify-content:center; align-items:center;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    font-family: 'Segoe UI', sans-serif; overflow:hidden; transition:0.5s;
}.card { background:#111; padding:50px; border-radius:30px; box-shadow:0 0 40px rgba(255,0,100,0.2); text-align:center; max-width:500px; width:85%; transition:0.6s; }

h1 { color:#fff; letter-spacing:2px; }

p { color:#aaa; }

#loveMsg { font-size:1.1rem; line-height:1.6; }

.hidden { display:none; }

.glitch { color: var(--rojo); text-shadow: 0 0 10px red, 0 0 30px crimson; animation: glitch 0.2s infinite; }

@keyframes glitch { 0% { transform: translate(0); } 25% { transform: translate(2px,-2px); } 50% { transform: translate(-2px,2px); } 75% { transform: translate(2px,2px); } 100% { transform: translate(0); } }

.emoji { position: fixed; pointer-events:none; animation: caer 3s linear forwards; } @keyframes caer { to { transform: translateY(110vh); opacity:0; } } </style>

</head>
<body><div class="card" id="card">
    <h1>Para ti 💘</h1>
    <p id="loveMsg">
        A pesar de todo, hay cosas que nunca se olvidan.
        <br><br>
        Momentos que parecían reales, risas que creí sinceras,
        y promesas que sonaban bonitas en su momento.
        <br><br>
        Supongo que algunas historias solo existen para enseñarte algo.
    </p>
</div><script>
const card = document.getElementById('card');
const msg = document.getElementById('loveMsg');

setTimeout(() => {
    // TRANSICIÓN BRUSCA 🔥
    document.body.style.background = "black";
    card.style.boxShadow = "0 0 60px red";

    card.innerHTML = `
        <h1 class="glitch">JAJA... NO 💀</h1>
        <p style="color:#888; line-height:1.6;">
        No era amor… era costumbre.
        <br><br>
        Gracias por irte 👋
        <br>
        Me hiciste un favor.
        </p>
    `;

    // lluvia de emojis 💥
    setInterval(()=>spawn('💔'),200);
    setInterval(()=>spawn('🔥'),300);
    setInterval(()=>spawn('✖️'),500);

}, 4000);

function spawn(e){
    const el = document.createElement('div');
    el.className='emoji';
    el.innerHTML=e;
    el.style.left=Math.random()*100+'vw';
    el.style.top='-10vh';
    el.style.fontSize=(Math.random()*25+15)+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
}
</script></body>
</html>
