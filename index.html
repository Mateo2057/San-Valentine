<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #0a0a0a;
            color: #ddd;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .text {
            font-size: 2.4rem;
            line-height: 1.5;
            font-weight: 300;
            max-width: 720px;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 2px;
            background: #ff4444;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Partículas sutiles frías */
        .particle {
            position: absolute;
            color: #555;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 12s linear infinite;
            opacity: 0.15;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-120vh);
            }
        }
    </style>
</head>
<body>

    <div class="text">
        Esto lo borré.<br><br>
        ¿Por qué entraste a leerlo?
        <span class="cursor">_</span>
    </div>

    <script>
        // Partículas frías dinámicas
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = ['×', '•', '–', '◆'][Math.floor(Math.random()*4)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '100vh';
            p.style.animationDuration = (Math.random() * 8 + 10) + 's';
            p.style.fontSize = (Math.random() * 1.4 + 0.9) + 'rem';
            document.body.appendChild(p);

            setTimeout(() => p.remove(), 20000);
        }

        // Lluvia sutil de partículas
        setInterval(() => {
            if (Math.random() > 0.4) createParticle();
        }, 180);

        // Crear algunas al inicio
        for (let i = 0; i < 18; i++) {
            setTimeout(createParticle, i * 120);
        }
    </script>
</body>
</html>
